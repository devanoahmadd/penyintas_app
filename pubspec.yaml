name: penyintas_app
description: "Penyintas — Aplikasi manajemen keuangan untuk mahasiswa & pekerja perantau Indonesia."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_bloc: ^9.0.0
  equatable: ^2.0.5

  # Dependency injection
  get_it: ^9.2.1

  # Functional programming
  dartz: ^0.10.1

  # Firebase
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  firebase_storage: ^13.3.0
  firebase_messaging: ^16.2.0
  firebase_app_check: ^0.4.3
  firebase_analytics: ^12.3.0
  firebase_crashlytics: ^5.2.0
  firebase_performance: ^0.11.3
  firebase_remote_config: ^6.4.0
  cloud_functions: ^6.2.0

  # Local storage
  isar: ^3.1.0
  isar_flutter_libs: ^3.1.0
  path_provider: ^2.1.0

  # Navigation
  go_router: ^17.2.3

  # UI
  flutter_svg: ^2.0.0
  google_fonts: ^8.1.0
  fl_chart: ^1.2.0
  flutter_local_notifications: ^21.0.0

  # Network
  connectivity_plus: ^7.1.1
  dio: ^5.0.0

  # Utilities
  uuid: ^4.0.0
  intl: ^0.20.0
  shared_preferences: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.0
  build_runner: ^2.4.0
  # isar_generator: ^3.1.0
  # ↑ Konflik analyzer dengan bloc_test ^10.
  # Cara pakai: flutter pub add dev:isar_generator → dart run build_runner build → flutter pub remove isar_generator

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/translations/

  # Font files diload via google_fonts package.
  # Tambahkan section fonts: di sini jika ingin bundling offline (Phase 6+)
